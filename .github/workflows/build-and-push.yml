name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

# Workflow-level permissions — required for GHCR push with GITHUB_TOKEN
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Derive lowercase owner (GHCR requires all-lowercase image names)
      - name: Set image names
        id: images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "manager=ghcr.io/${OWNER}/dlp-manager" >> $GITHUB_OUTPUT
          echo "dashboard=ghcr.io/${OWNER}/dlp-dashboard" >> $GITHUB_OUTPUT
          echo "smtp_relay=ghcr.io/${OWNER}/dlp-smtp-relay" >> $GITHUB_OUTPUT

      - name: Build and push manager image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.manager }}:latest
            ${{ steps.images.outputs.manager }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.dashboard }}:latest
            ${{ steps.images.outputs.dashboard }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push smtp-relay image
        uses: docker/build-push-action@v6
        with:
          context: ./smtp-relay
          file: ./smtp-relay/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.smtp_relay }}:latest
            ${{ steps.images.outputs.smtp_relay }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
