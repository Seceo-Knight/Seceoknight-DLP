name: Build Windows Agent

on:
     push:
       branches: [ main ]
       paths:
         - 'agents/endpoint/windows/agent.cpp'
         - 'agents/endpoint/windows/network_exfil_monitor.cpp'
         - 'agents/endpoint/windows/print_monitor.cpp'
         - 'agents/endpoint/windows/screen_capture_monitor.cpp'
         - 'agents/endpoint/windows/**.h'
         - '.github/workflows/build-windows-agent.yml'
     workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-headers-git
            mingw-w64-x86_64-windows-default-manifest

      - name: Generate fltlib import library
        run: |
          echo "=== Generating fltlib import library from Windows system DLL ==="
          # fltLib.dll is a Windows system DLL — MinGW has no pre-built .a for it.
          # We create the .def file manually listing just the functions we use,
          # then use dlltool to generate libfltlib.a so we can link with -lfltlib.
          cat > /tmp/fltLib.def << 'EOF'
          LIBRARY "fltLib.dll"
          EXPORTS
            FilterConnectCommunicationPort
            FilterDisconnectCommunicationPort
            FilterGetMessage
            FilterReplyMessage
            FilterSendMessage
            FilterLoad
            FilterUnload
          EOF
          dlltool -D fltLib.dll -d /tmp/fltLib.def -l /mingw64/lib/libfltlib.a
          echo "libfltlib.a created: $(ls -lh /mingw64/lib/libfltlib.a)"

      - name: Build Windows agent
        working-directory: agents/endpoint/windows
        run: |
          echo "=== Compiler version ==="
          g++ --version

          echo "=== Checking headers ==="
          ls /mingw64/include/wbemidl.h 2>/dev/null && echo "wbemidl.h found" || echo "wbemidl.h NOT found"
          ls /mingw64/include/winhttp.h 2>/dev/null && echo "winhttp.h found" || echo "winhttp.h NOT found"
          ls /mingw64/lib/libfltlib.a 2>/dev/null && echo "libfltlib.a found" || echo "libfltlib.a NOT found"

          echo "=== Compiling ==="
          # -mwindows: GUI subsystem, so the OS never auto-creates a console
          # window for this process (background mode then has none at all —
          # see AttachForegroundConsole() in agent.cpp for the full reasoning).
          g++ -std=c++17 -O2 -mwindows \
            agent.cpp \
            network_exfil_monitor.cpp \
            print_monitor.cpp \
            screen_capture_monitor.cpp \
            -o seceoknight_agent.exe \
            -lwinhttp \
            -lwbemuuid \
            -lole32 \
            -loleaut32 \
            -luser32 \
            -lws2_32 \
            -lsetupapi \
            -ladvapi32 \
            -lcfgmgr32 \
            -lshell32 \
            -luuid \
            -lcomdlg32 \
            -lgdi32 \
            -lwinspool \
            -lfltlib \
            -lcrypt32 \
            -static-libgcc \
            -static-libstdc++ \
            -static -lpthread \
            2>&1

          echo "=== Checking runtime dependencies ==="
          objdump -p seceoknight_agent.exe | grep "DLL Name" | grep -iv "kernel32\|user32\|advapi32\|ole32\|oleaut32\|winhttp\|ws2_32\|setupapi\|cfgmgr32\|shell32\|uuid\|comdlg32\|gdi32\|winspool\|wbemuuid\|ntdll\|msvcrt" || echo "No unexpected DLL dependencies"
          echo "Exit code: $?"
          ls -lh seceoknight_agent.exe

      - name: Generate SHA256 checksum
        working-directory: agents/endpoint/windows
        run: |
          sha256sum seceoknight_agent.exe > seceoknight_agent.exe.sha256
          cat seceoknight_agent.exe.sha256

      - name: Commit updated binary
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents/endpoint/windows/seceoknight_agent.exe
          git add agents/endpoint/windows/seceoknight_agent.exe.sha256
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "build: update Windows agent binary [skip ci]"

          # Two source-touching pushes close together each trigger their own
          # run of this workflow. Both build in parallel; whichever commits
          # its binary first wins, and the other's plain `git push` gets
          # rejected (remote has moved) — a false-alarm failed run even
          # though the "losing" run's output was redundant, not wrong.
          # Retry with fetch + rebase so a late run integrates cleanly
          # instead of failing outright.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — fetching and rebasing before retry..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase failed — manual intervention needed"; exit 1; }
          done

          echo "Push still failing after retries"
          exit 1
