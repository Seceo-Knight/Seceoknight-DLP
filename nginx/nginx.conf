# ─────────────────────────────────────────────────────────────────────────────
# SeceoKnight DLP — Nginx Reverse Proxy with SSL Termination
#
# Topology:
#   Internet → Nginx:443 (SSL) → manager:55000  (API)
#                              → dashboard:3000  (UI)
#   Internet → Nginx:80        → 301 redirect to HTTPS
#
# Certs:
#   Real domain  → use scripts/generate-certs.sh (Let's Encrypt / certbot)
#   IP / local   → use scripts/generate-certs.sh --self-signed
# ─────────────────────────────────────────────────────────────────────────────

# Rate limit zones — bucketed per client IP
limit_req_zone  $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_req_zone  $binary_remote_addr zone=api_auth:10m    rate=5r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# WebSocket upgrade helper
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server_tokens off;

# Docker's embedded DNS server — resolves service names (manager, dashboard)
# to their CURRENT container IP. This is required for the variable-based
# proxy_pass below: `docker compose up -d` recreates a container (e.g. after
# `pull`) with a brand-new internal IP, but nginx itself normally keeps
# running the whole time and would otherwise cache the OLD IP for the life
# of the process — every request then fails with "502 Bad Gateway" /
# "connect() failed (111: Connection refused)" until nginx is manually
# restarted. Using a variable in proxy_pass (see below) forces nginx to
# re-resolve via this resolver every `valid` seconds instead, so it picks up
# a recreated container's new IP automatically, no manual nginx restart
# needed after routine updates.
resolver 127.0.0.11 valid=10s;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge passthrough (certbot webroot method)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Agent API — allow plain HTTP so agents without SSL support can connect
    location /api/ {
        limit_req zone=api_general burst=40 nodelay;

        set $upstream_manager manager:55000;
        proxy_pass         http://$upstream_manager;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # ── TLS ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern TLS only — drop SSLv3, TLS 1.0, TLS 1.1
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Session resumption — reduces TLS handshake overhead
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — speeds up cert validation for clients
    ssl_stapling        on;
    ssl_stapling_verify on;
    # Docker's embedded DNS (127.0.0.11) — NOT public DNS. This server block's
    # proxy_pass directives below resolve internal-only names (manager,
    # dashboard) that only 127.0.0.11 knows about; a resolver directive here
    # would otherwise override the http-level one above and break that
    # resolution (server-context wins over http-context). Docker's embedded
    # DNS also transparently forwards anything it doesn't recognize (e.g. the
    # OCSP responder's public hostname) out to the host's real DNS, so OCSP
    # stapling keeps working through this same resolver.
    resolver            127.0.0.11 valid=10s;
    resolver_timeout    5s;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # ── General settings ───────────────────────────────────────────────────
    client_max_body_size    20M;
    client_body_timeout     30s;
    client_header_timeout   15s;
    large_client_header_buffers 4 16k;
    keepalive_timeout       65;

    # Per-IP connection cap
    limit_conn api_conn 50;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Auth endpoints — strict rate limit ────────────────────────────────
    location ~ ^/api/v1/auth/(login|register|refresh|forgot) {
        limit_req zone=api_auth burst=10 nodelay;

        set $upstream_manager manager:55000;
        proxy_pass         http://$upstream_manager;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;
    }

    # ── General API proxy ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=40 nodelay;

        set $upstream_manager manager:55000;
        proxy_pass         http://$upstream_manager;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering    off;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Prometheus metrics — internal only ───────────────────────────────
    # Block /metrics from the public internet. Remove this block only if
    # your scraper is external and you've added auth in front of it.
    location /metrics {
        deny all;
        return 403;
    }

    # ── Dashboard (SPA) ───────────────────────────────────────────────────
    location / {
        set $upstream_dashboard dashboard:3000;
        proxy_pass         http://$upstream_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Static asset caching ──────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        set $upstream_dashboard dashboard:3000;
        proxy_pass http://$upstream_dashboard;
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Block hidden files ────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
